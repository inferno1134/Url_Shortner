services:
  db:
    image: postgres:15-alpine
    command: postgres -c max_connections=200
    environment:
      POSTGRES_USER: shortner
      POSTGRES_PASSWORD: shortnerpass
      POSTGRES_DB: shortnerdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortner -d shortnerdb"]
      interval: 2s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 2s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://shortner:shortnerpass@db:5432/shortnerdb"
      REDIS_ADDR: "redis:6379"
    ports:
      - "8080:8080"